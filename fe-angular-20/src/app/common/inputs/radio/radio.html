<div class="flex flex-col">
  @if (!!label()) {
    <label>{{ label() }}</label>
  }
  <nz-radio-group
    [ngModel]="value()"
    (ngModelChange)="onValueChange($event)"
    [nzDisabled]="disabled"
  >
    @for (option of options(); track option.value) {
      <label nz-radio [nzValue]="option.value">
        {{ option.label }}
      </label>
    }
  </nz-radio-group>
</div>
